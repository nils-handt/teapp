<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recording Visualizer</title>
    <link rel="stylesheet" href="../node_modules/dygraphs/dist/dygraph.css" />
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }
        #graph-container {
            width: 100%;
            height: 500px;
            margin-top: 20px;
        }
        .controls {
            margin-bottom: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Recording Visualizer</h1>
    
    <div class="controls">
        <label for="fileInput">Select Recording JSON:</label>
        <input type="file" id="fileInput" accept=".json">
        <div id="file-info" style="margin-top: 10px; color: #666;"></div>
    </div>

    <div id="graph-container"></div>

    <script type="module">
        import Dygraph from 'dygraphs';

        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('file-info');
        const graphContainer = document.getElementById('graph-container');
        let g = null;

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) {
                return;
            }

            fileInfo.textContent = `Loading: ${file.name}`;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    
                    if (!json.data || !Array.isArray(json.data)) {
                        throw new Error("Invalid JSON format: 'data' array missing.");
                    }

                    const graphData = json.data.map(idx => {
                        // timestamp is in ms, dygraphs expects Date objects or timestamps
                        return [new Date(idx.timestamp), idx.weight];
                    });

                    if (g) {
                        g.destroy();
                    }

                    g = new Dygraph(
                        graphContainer,
                        graphData,
                        {
                            labels: ['Time', 'Weight'],
                            title: json.name || 'Recording Data',
                            ylabel: 'Weight',
                            xlabel: 'Time',
                            showRangeSelector: true,
                            interactionModel: Dygraph.defaultInteractionModel,
                            animatedZooms: true,
                        }
                    );

                    fileInfo.textContent = `Loaded: ${file.name} (${json.data.length} points)`;
                } catch (err) {
                    console.error(err);
                    fileInfo.textContent = `Error: ${err.message}`;
                    alert("Error parsing file: " + err.message);
                }
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
